<svg viewBox="0 0 360 220" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Cascading rank-1 errors: each step's residual amplifies the previous one's error through spectral-gap-dependent factors">
  <rect width="360" height="220" fill="#f6f6f4"/>

  <!-- grid (lab-notebook backdrop, faint) -->
  <defs>
    <pattern id="grid" width="12" height="12" patternUnits="userSpaceOnUse">
      <path d="M 12 0 L 0 0 0 12" fill="none" stroke="#e6e6e3" stroke-width="0.5"/>
    </pattern>
  </defs>
  <rect width="360" height="220" fill="url(#grid)"/>

  <!-- masthead rule -->
  <line x1="20" y1="34" x2="340" y2="34" stroke="#1d1d20" stroke-width="1.4"/>
  <text x="20" y="26" font-family="JetBrains Mono, ui-monospace, monospace" font-size="9" letter-spacing="1.5" font-weight="700" fill="#1d1d20">ONE RANK AT A TIME</text>
  <text x="340" y="26" text-anchor="end" font-family="JetBrains Mono, monospace" font-size="9" letter-spacing="1" fill="#5b5b5e">TMLR · 2026</text>

  <!-- bars: each represents one rank-1 step. Height grows = error cascading. -->
  <!-- step labels axis -->
  <line x1="46" y1="186" x2="320" y2="186" stroke="#1d1d20" stroke-width="0.8"/>
  <text x="46"  y="200" font-family="JetBrains Mono, monospace" font-size="8.5" fill="#5b5b5e">k=1</text>
  <text x="86"  y="200" font-family="JetBrains Mono, monospace" font-size="8.5" fill="#5b5b5e">k=2</text>
  <text x="126" y="200" font-family="JetBrains Mono, monospace" font-size="8.5" fill="#5b5b5e">k=3</text>
  <text x="166" y="200" font-family="JetBrains Mono, monospace" font-size="8.5" fill="#5b5b5e">k=4</text>
  <text x="206" y="200" font-family="JetBrains Mono, monospace" font-size="8.5" fill="#5b5b5e">k=5</text>
  <text x="246" y="200" font-family="JetBrains Mono, monospace" font-size="8.5" fill="#5b5b5e">k=6</text>
  <text x="286" y="200" font-family="JetBrains Mono, monospace" font-size="8.5" fill="#5b5b5e">k=7</text>

  <!-- step-1 error: small green block (the "first mistake") -->
  <rect x="46"  y="170" width="28" height="16" fill="#1a5f3c"/>
  <!-- step-2 inherits + own: -->
  <rect x="86"  y="160" width="28" height="10" fill="#1a5f3c"/>
  <rect x="86"  y="148" width="28" height="12" fill="#c84539" opacity="0.45"/>
  <!-- step-3: -->
  <rect x="126" y="158" width="28" height="12" fill="#1a5f3c"/>
  <rect x="126" y="142" width="28" height="16" fill="#c84539" opacity="0.55"/>
  <rect x="126" y="124" width="28" height="18" fill="#c84539" opacity="0.65"/>
  <!-- step-4: more red -->
  <rect x="166" y="156" width="28" height="14" fill="#1a5f3c"/>
  <rect x="166" y="138" width="28" height="18" fill="#c84539" opacity="0.55"/>
  <rect x="166" y="118" width="28" height="20" fill="#c84539" opacity="0.7"/>
  <rect x="166" y="96"  width="28" height="22" fill="#c84539" opacity="0.85"/>
  <!-- step-5: -->
  <rect x="206" y="154" width="28" height="16" fill="#1a5f3c"/>
  <rect x="206" y="134" width="28" height="20" fill="#c84539" opacity="0.55"/>
  <rect x="206" y="112" width="28" height="22" fill="#c84539" opacity="0.7"/>
  <rect x="206" y="88"  width="28" height="24" fill="#c84539" opacity="0.85"/>
  <rect x="206" y="62"  width="28" height="26" fill="#c84539"/>
  <!-- step-6: cascade dominant -->
  <rect x="246" y="152" width="28" height="18" fill="#1a5f3c"/>
  <rect x="246" y="130" width="28" height="22" fill="#c84539" opacity="0.55"/>
  <rect x="246" y="106" width="28" height="24" fill="#c84539" opacity="0.7"/>
  <rect x="246" y="80"  width="28" height="26" fill="#c84539" opacity="0.85"/>
  <rect x="246" y="52"  width="28" height="28" fill="#c84539"/>
  <!-- step-7: -->
  <rect x="286" y="150" width="28" height="20" fill="#1a5f3c"/>
  <rect x="286" y="126" width="28" height="24" fill="#c84539" opacity="0.55"/>
  <rect x="286" y="100" width="28" height="26" fill="#c84539" opacity="0.7"/>
  <rect x="286" y="72"  width="28" height="28" fill="#c84539" opacity="0.85"/>
  <rect x="286" y="42"  width="28" height="30" fill="#c84539"/>

  <!-- legend -->
  <rect x="46" y="44" width="9" height="9" fill="#1a5f3c"/>
  <text x="60" y="52" font-family="JetBrains Mono, monospace" font-size="8.5" fill="#1d1d20">fresh per-step error</text>
  <rect x="195" y="44" width="9" height="9" fill="#c84539"/>
  <text x="209" y="52" font-family="JetBrains Mono, monospace" font-size="8.5" fill="#1d1d20">inherited cascade</text>

  <!-- y-axis label -->
  <text x="38" y="180" text-anchor="end" font-family="JetBrains Mono, monospace" font-size="8" fill="#5b5b5e" transform="rotate(-90,38,180)">cumulative error</text>
</svg>
